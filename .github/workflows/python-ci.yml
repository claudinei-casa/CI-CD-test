name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Linter (flake8)
      run: |
        # Para a build se houver erros de sintaxe ou variáveis não definidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Verifica a formatação do código (limite de 127 caracteres)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Executar Testes Unitários (pytest local)
      run: |
        pytest

    - name: Notificar Sucesso no Discord
      if: success()
      uses: appleboy/discord-action@master
      with:
        webhook_id: "1499187955674386533"
        webhook_token: "VzMKOnzf7p9gDkLtdx-bBzBACz5Z0nMkiviDcV2YWvE07AGhAddXYfLzLb1xa5cR8VtC"
        message: "✅ CI Sucesso: A Pull Request no repositório ${{ github.repository }} passou em todos os testes!"

    - name: Notificar Falha no Discord
      if: failure()
      uses: appleboy/discord-action@master
      with:
        webhook_id: "1499187955674386533"
        webhook_token: "VzMKOnzf7p9gDkLtdx-bBzBACz5Z0nMkiviDcV2YWvE07AGhAddXYfLzLb1xa5cR8VtC"
        message: "❌ CI Falha: A Pull Request no repositório ${{ github.repository }} falhou nos testes ou no linter. Verifique os logs!"

  docker-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Construir imagem Docker
      run: docker build -t meu-python-app .

    - name: Executar Testes Unitários dentro do Docker
      run: docker run meu-python-app pytest
